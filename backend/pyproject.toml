[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "autologbook-backend"
version = "0.1.0"
dependencies = [
  "celery[redis]>=5.3",
  "fastapi>=0.110",
  "uvicorn[standard]>=0.29"
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["app*"]
